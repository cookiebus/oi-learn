# ============================
# 信奥学 - Docker Compose 部署
# ============================
# 使用方法：
#   1. 复制 .env.production 为 .env，修改配置
#   2. docker compose up -d
#   3. 访问 http://localhost:3000
#
# 带 SSL 的完整部署请参考 deploy.sh

services:
  # ---- Next.js 应用 ----
  app:
    build: .
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://oilearn:oilearn123@db:5432/oilearn
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=https://${DOMAIN:-shencode.cn}
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://api.deepseek.com/v1}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - WIKIOI_API_URL=${WIKIOI_API_URL:-https://wikioi.cn/api}
      - WIKIOI_API_KEY=${WIKIOI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    # 首次启动后，运行数据库迁移和种子数据
    # docker compose exec app npx prisma db push
    # docker compose exec app npx tsx prisma/seed.ts

  # ---- PostgreSQL 数据库 ----
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: oilearn
      POSTGRES_PASSWORD: oilearn123
      POSTGRES_DB: oilearn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oilearn"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Nginx 反向代理（可选） ----
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot
    depends_on:
      - app
    command: >
      /bin/sh -c "
        if [ -f /etc/nginx/ssl/fullchain.pem ]; then
          nginx -g 'daemon off;'
        else
          echo '⚠ SSL 证书未找到，仅启动 HTTP...';
          sed -i 's/443.*//' /etc/nginx/nginx.conf 2>/dev/null || true;
          nginx -g 'daemon off;'
        fi
      "

volumes:
  pgdata:
  certbot-data:
